<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voicing FCO — the custody graph has a voice</title>
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #15151a;
    --border: #26262e;
    --text: #e8e8ed;
    --muted: #8a8a96;
    --accent: #c89b3c;
    --green: #5cb87a;
    --red: #d36c6c;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.5; padding: 1.5rem; }
  h1 { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 0.25rem; }
  .sub { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; }
  .card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.75rem; font-weight: 500; }
  textarea { width: 100%; min-height: 80px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; font-family: var(--mono); font-size: 0.9rem; resize: vertical; }
  button { background: var(--accent); color: #1a1a1a; border: none; border-radius: 6px; padding: 0.6rem 1.1rem; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: filter 0.15s; }
  button:hover:not(:disabled) { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .row { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
  audio { width: 100%; margin-top: 0.75rem; }
  .graph { max-height: 480px; overflow-y: auto; font-family: var(--mono); font-size: 0.78rem; }
  .node { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.7rem 0.9rem; margin-bottom: 0.5rem; }
  .node.genesis { border-left: 3px solid var(--accent); }
  .node .type { color: var(--accent); font-weight: 600; }
  .node .id { color: var(--muted); font-size: 0.7rem; word-break: break-all; }
  .node .preview { color: var(--text); margin-top: 0.3rem; word-break: break-word; }
  .node .ceiling { color: var(--muted); margin-top: 0.3rem; font-size: 0.72rem; font-style: italic; }
  .verify-ok { color: var(--green); }
  .verify-err { color: var(--red); }
  .root { font-family: var(--mono); font-size: 0.75rem; word-break: break-all; padding: 0.5rem; background: var(--bg); border-radius: 4px; margin-top: 0.5rem; }
  .pill { display: inline-block; background: var(--border); color: var(--text); padding: 2px 8px; border-radius: 999px; font-size: 0.7rem; margin-right: 4px; font-family: var(--mono); }
  .status { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }
  /* Four-tier architecture */
  .tier { background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 6px; padding: 0.6rem 0.75rem; font-size: 0.78rem; }
  .tier[data-tier="2"] { border-left-color: #6b9bd1; }
  .tier[data-tier="3"] { border-left-color: var(--green); }
  .tier[data-tier="4"] { border-left-color: #b66bc7; }
  .tier-num { display: inline-block; background: var(--accent); color: #1a1a1a; border-radius: 999px; padding: 0px 8px; font-weight: 700; font-size: 0.7rem; margin-right: 6px; }
  .tier-name { font-weight: 600; color: var(--text); display: inline; }
  .tier-body { color: var(--muted); font-size: 0.72rem; margin-top: 0.3rem; line-height: 1.35; }
  label { display: block; }

  .status { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="./client.js"></script>
</body>
</html>
